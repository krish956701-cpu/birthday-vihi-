<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Vihi 💖</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial;
}

/* SLIDES */
.slide {
    position: absolute;
    width: 100%;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    color: white;
    text-align: center;
    opacity: 0;
    transition: 1s;
}

/* ACTIVE */
.active {
    opacity: 1;
}

/* BACKGROUND IMAGE */
.bg {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -1;
    filter: brightness(0.6);
    animation: zoom 6s linear infinite;
}

@keyframes zoom {
    0% {transform: scale(1);}
    100% {transform: scale(1.1);}
}

/* TEXT ANIMATION */
h1 {
    font-size: 35px;
    animation: fadeUp 1.5s ease;
}

@keyframes fadeUp {
    from {opacity:0; transform: translateY(40px);}
    to {opacity:1; transform: translateY(0);}
}

/* BUTTON */
button {
    padding: 12px 20px;
    border-radius: 10px;
    border: none;
    background: #ff4b5c;
    color: white;
}
</style>

</head>

<body onclick="startMusic()">

<audio id="music" src="music.mp3"></audio>

<!-- 1 -->
<div class="slide active">
<img class="bg" src="photo1.jpg">
<h1>🎉 Happy Birthday Vihi 🎉</h1>

</div>

</div>

<script>
let slides = document.querySelectorAll(".slide");
let index = 0;

// AUTO SLIDE
setInterval(()=>{
    slides[index].classList.remove("active");
    index = (index + 1) % slides.length;
    slides[index].classList.add("active");
},4000);

// MUSIC
function startMusic(){
    document.getElementById("music").play();
}

// SURPRISE
function showMsg(){
    document.getElementById("msg").style.display="block";
}
</script>
